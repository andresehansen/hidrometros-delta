name: Actualizar Ríos

on:
  schedule:
    - cron: '*/15 * * * *' # El robot se ejecutará cada 15 minutos automáticamente
  workflow_dispatch:

jobs:
  scraping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scraper.js
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datos.json
          git commit -m "Datos actualizados" || exit 0
          git push
