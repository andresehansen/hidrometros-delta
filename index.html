<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hidrómetros – Delta Entrerriano</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; touch-action: none; 
      background: #0a1628; color: #f0f4ff; font-family: 'Segoe UI', Arial, sans-serif;
    }
    #app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }

    /* Encabezado y Navegación Superior */
    #encabezado { flex: 0 0 auto; background: #0d1f3c; padding: 10px; display: flex; flex-direction: column; gap: 10px; border-bottom: 3px solid #2a5caa; }
    
    .tabs-principales { display: flex; gap: 10px; width: 100%; }
    .tab-btn { flex: 1; padding: 15px; font-size: clamp(20px, 5vw, 28px); font-weight: bold; border: 2px solid #2a5caa; border-radius: 10px; background: #1a3a6b; color: #a0bce8; cursor: pointer; }
    .tab-btn.activo { background: #4a8fd4; color: #ffffff; border-color: #7eb8f7; }

    .tabs-secundarias { display: flex; gap: 10px; width: 100%; }
    .sub-tab-btn { flex: 1; padding: 12px; font-size: clamp(18px, 4.5vw, 24px); border: 1px solid #2a5caa; border-radius: 8px; background: transparent; color: #7eb8f7; cursor: pointer; }
    .sub-tab-btn.activo { background: rgba(74, 143, 212, 0.3); color: #ffffff; font-weight: bold; }

    /* Contenido Central */
    #contenido { flex: 1 1 auto; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #tarjeta { background: #0d1f3c; border: 3px solid #2a5caa; border-radius: 20px; width: 100%; max-width: 650px; padding: 20px; text-align: center; display: flex; flex-direction: column; gap: 15px; }
    
    #nombre-estacion { font-size: clamp(34px, 8vw, 56px); font-weight: 900; color: #ffffff; margin-bottom: 10px; }
    
    /* Vistas Actuales */
    .vista-actual { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .valor-gigante { font-size: clamp(80px, 22vw, 130px); font-weight: 900; line-height: 1; margin: 10px 0; }
    .unidad { font-size: clamp(24px, 6vw, 32px); color: #a0bce8; }
    .tendencia { font-size: clamp(28px, 6vw, 36px); font-weight: bold; padding: 10px 25px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-top: 10px;}

    /* Vistas Históricas */
    .vista-historico { width: 100%; text-align: left; }
    .lista-historial { list-style: none; padding: 0; margin: 0; width: 100%; }
    .lista-historial li { font-size: clamp(24px, 6vw, 34px); padding: 15px 10px; border-bottom: 1px solid #2a5caa; display: flex; justify-content: space-between; }
    .lista-historial li:last-child { border-bottom: none; }
    .hist-hora { color: #a0bce8; }
    .hist-valor { font-weight: bold; color: #ffffff; }

    /* Colores */
    .color-subiendo { color: #ff6b6b; }
    .color-bajando { color: #51cf66; }
    .color-estable { color: #ffd43b; }
    .color-sin-dato { color: #868e96; }
    .oculto { display: none !important; }

    /* Navegación Inferior */
    #paginador { flex: 0 0 auto; padding: 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #0d1f3c; border-top: 3px solid #2a5caa; }
    .btn-nav { flex: 1; padding: 25px 10px; font-size: clamp(24px, 6.5vw, 38px); font-weight: 900; border: none; border-radius: 15px; cursor: pointer; }
    #btn-anterior { background: #1a3a6b; color: #7eb8f7; border: 3px solid #2a5caa; }
    #btn-siguiente { background: #1a4f8a; color: #ffffff; border: 3px solid #4a8fd4; }
  </style>
</head>
<body>

<div id="app">
  <header id="encabezado">
    <div class="tabs-principales">
      <button id="tab-altura" class="tab-btn activo" onclick="cambiarCategoria('altura')">🌊 Altura Río</button>
      <button id="tab-viento" class="tab-btn" onclick="cambiarCategoria('viento')">💨 Viento</button>
    </div>
    <div class="tabs-secundarias">
      <button id="subtab-actual" class="sub-tab-btn activo" onclick="cambiarVista('actual')">Estado Actual</button>
      <button id="subtab-historial" class="sub-tab-btn" onclick="cambiarVista('historial')">Últimas Horas</button>
    </div>
  </header>

  <main id="contenido">
    <article id="tarjeta">
      <h1 id="nombre-estacion">Cargando...</h1>

      <div id="panel-altura">
        <div id="altura-actual" class="vista-actual">
          <span class="valor-gigante" id="val-altura">—</span>
          <span class="unidad">metros</span>
          <span class="tendencia" id="tendencia-altura">Conectando...</span>
        </div>
        <div id="altura-historial" class="vista-historico oculto">
          <ul class="lista-historial" id="lista-altura">
             <li><span class="hist-hora">Aguarde...</span><span class="hist-valor">—</span></li>
          </ul>
        </div>
      </div>

      <div id="panel-viento" class="oculto">
        <div id="viento-actual" class="vista-actual">
          <span class="valor-gigante" id="val-viento">—</span>
          <span class="unidad">km/h</span>
          <span class="tendencia" id="tendencia-viento">Dirección: —</span>
        </div>
        <div id="viento-historial" class="vista-historico oculto">
          <ul class="lista-historial" id="lista-viento">
             <li><span class="hist-hora">Aguarde...</span><span class="hist-valor">—</span></li>
          </ul>
        </div>
      </div>

    </article>
  </main>

  <nav id="paginador">
    <button id="btn-anterior" class="btn-nav" onclick="navegarA(-1)">◀ Anterior</button>
    <button id="btn-siguiente" class="btn-nav" onclick="navegarA(1)">Siguiente ▶</button>
  </nav>
</div>

<script>
  let estacionesData = [];
  let indiceActual = 0;
  let categoriaActual = 'altura';
  let vistaActual = 'actual';

  async function cargarDatos() {
    try {
      const resp = await fetch('datos.json?t=' + new Date().getTime());
      if (!resp.ok) {
         document.getElementById('nombre-estacion').textContent = "Esperando al robot...";
         return;
      }
      const data = await resp.json();
      if (data && data.estaciones) {
          estacionesData = data.estaciones;
          renderizarPantalla();
      }
    } catch (e) { 
      document.getElementById('nombre-estacion').textContent = "Error de red";
    }
  }

  function cambiarCategoria(cat) {
    categoriaActual = cat;
    document.getElementById('tab-altura').classList.toggle('activo', cat === 'altura');
    document.getElementById('tab-viento').classList.toggle('activo', cat === 'viento');
    document.getElementById('panel-altura').classList.toggle('oculto', cat !== 'altura');
    document.getElementById('panel-viento').classList.toggle('oculto', cat !== 'viento');
    renderizarPantalla();
  }

  function cambiarVista(vista) {
    vistaActual = vista;
    document.getElementById('subtab-actual').classList.toggle('activo', vista === 'actual');
    document.getElementById('subtab-historial').classList.toggle('activo', vista === 'historial');
    document.getElementById('altura-actual').classList.toggle('oculto', vista !== 'actual');
    document.getElementById('altura-historial').classList.toggle('oculto', vista !== 'historial');
    document.getElementById('viento-actual').classList.toggle('oculto', vista !== 'actual');
    document.getElementById('viento-historial').classList.toggle('oculto', vista !== 'historial');
    renderizarPantalla();
  }

  function navegarA(direccion) {
    if (estacionesData.length === 0) return;
    // Lógica matemática segura para navegar en círculos
    indiceActual = (indiceActual + direccion + estacionesData.length) % estacionesData.length;
    renderizarPantalla();
  }

  function renderizarPantalla() {
    if (!estacionesData || estacionesData.length === 0) return;
    
    try {
        const est = estacionesData[indiceActual];
        document.getElementById('nombre-estacion').textContent = est.nombre;

        // --- RENDER ALTURA ---
        const valAltura = document.getElementById('val-altura');
        const tendAltura = document.getElementById('tendencia-altura');
        
        let numAltura = Number(est.altura);
        if (est.altura !== null && !isNaN(numAltura)) {
          valAltura.textContent = numAltura.toFixed(2);
          valAltura.className = "valor-gigante";
          if (numAltura >= 4.0) valAltura.classList.add("color-subiendo");
          else if (numAltura >= 2.0) valAltura.classList.add("color-estable");
          else valAltura.classList.add("color-bajando");
        } else {
          valAltura.textContent = "S/D";
          valAltura.className = "valor-gigante color-sin-dato";
        }

        const iconos = { "SUBIENDO": "↑ Subiendo", "BAJANDO": "↓ Bajando", "ESTABLE": "→ Estable", "—": "? Sin dato" };
        tendAltura.textContent = iconos[est.tendencia] || iconos["—"];

        // HISTORIAL ALTURA
        const listaAlt = document.getElementById('lista-altura');
        listaAlt.innerHTML = "";
        if (est.historialAltura && est.historialAltura.length > 0) {
            est.historialAltura.forEach(h => {
                let v = Number(h.valor);
                let displayVal = isNaN(v) ? "—" : v.toFixed(2) + " m";
                listaAlt.innerHTML += `<li><span class="hist-hora">${h.hora}</span><span class="hist-valor">${displayVal}</span></li>`;
            });
        } else {
            listaAlt.innerHTML = `<li><span class="hist-hora">Sin historial oficial</span><span class="hist-valor">—</span></li>`;
        }

        // --- RENDER VIENTO ---
        const valViento = document.getElementById('val-viento');
        const tendViento = document.getElementById('tendencia-viento');
        
        let numViento = Number(est.vientoActual);
        if (est.vientoActual !== null && !isNaN(numViento)) {
            valViento.textContent = numViento.toFixed(1);
            valViento.className = "valor-gigante";
            let dir = est.vientoDireccion ? est.vientoDireccion : "Var";
            if (!isNaN(Number(dir))) dir = dir + "°";
            tendViento.textContent = "Dirección: " + dir;
        } else {
            valViento.textContent = "S/D";
            valViento.className = "valor-gigante color-sin-dato";
            tendViento.textContent = "Estación sin sensor de viento";
        }

        // HISTORIAL VIENTO
        const listaViento = document.getElementById('lista-viento');
        listaViento.innerHTML = "";
        if (est.historialViento && est.historialViento.length > 0) {
            est.historialViento.forEach(h => {
                let v = Number(h.valor);
                let displayVal = isNaN(v) ? "—" : v.toFixed(1) + " km/h";
                listaViento.innerHTML += `<li><span class="hist-hora">${h.hora}</span><span class="hist-valor">${displayVal}</span></li>`;
            });
        } else {
            listaViento.innerHTML = `<li><span class="hist-hora">Sin historial oficial</span><span class="hist-valor">—</span></li>`;
        }
    } catch(error) {
        document.getElementById('nombre-estacion').textContent = "Ajustando datos...";
    }
  }

  setInterval(cargarDatos, 60000); 
  cargarDatos();
</script>
